<!DOCTYPE html>
<html lang="en">
    <style>/* Import font */
@import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');

body {
  margin: 0;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Orbitron', sans-serif;
}

.calculator {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
  width: 320px;
}

#display {
  background: #000;
  color: #0f0;
  padding: 20px;
  font-size: 2rem;
  border-radius: 10px;
  margin-bottom: 20px;
  text-align: right;
  overflow-x: auto;
  box-shadow: inset 0 0 10px #0f0;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.btn {
  padding: 20px;
  font-size: 1.2rem;
  border: none;
  border-radius: 10px;
  background-color: #2e2e2e;
  color: white;
  cursor: pointer;
  transition: background 0.2s ease;
}

.btn:hover {
  background-color: #444;
}

.operator {
  background-color: #ff7f50;
  color: white;
}

.operator:hover {
  background-color: #ff4c29;
}

.equal {
  background-color: #00c853;
  grid-row: span 2;
}

.equal:hover {
  background-color: #00a644;
}

.zero {
  grid-column: span 2;
}
</style>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>
  <div class="calculator">
    <div id="display">0</div>
    <div class="buttons">
      <button class="btn operator" data-value="C">C</button>
      <button class="btn operator" data-value="/">÷</button>
      <button class="btn operator" data-value="*">×</button>
      <button class="btn operator" data-value="Del">⌫</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn operator" data-value="-">−</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn operator" data-value="+">+</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn equal" data-value="=">=</button>

      <button class="btn zero" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<script>const display = document.getElementById("display");
const buttons = document.querySelectorAll(".btn");

let currentInput = "";

buttons.forEach(button => {
  button.addEventListener("click", () => {
    const value = button.getAttribute("data-value");

    if (value === "=") {
      try {
        currentInput = eval(currentInput).toString();
      } catch {
        currentInput = "Error";
      }
    } else if (value === "C") {
      currentInput = "";
    } else if (value === "Del") {
      currentInput = currentInput.slice(0, -1);
    } else {
      currentInput += value;
    }

    display.textContent = currentInput || "0";
  });
});
</script>
